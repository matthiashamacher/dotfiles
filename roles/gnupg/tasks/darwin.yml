---
- name: "gnupg | Install gnupg"
  homebrew:
    name: gnupg
    state: latest
    sudo_password: "{{ ansible_become_password | default(omit) }}"
  become: "{{ (homebrew_user != ansible_user_id) | bool }}"
  become_user: "{{ homebrew_user }}"
  when:
    - "'gnupg' in homebrew_outdated_packages or 'gnupg' in homebrew_installed_packages"