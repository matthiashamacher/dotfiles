---
- name: "Mac App Store CLI (mas) | Install"
  homebrew:
    name: mas
    state: latest
    sudo_password: "{{ ansible_become_password | default(omit) }}"
  become: "{{ (homebrew_user != ansible_user_id) | bool }}"
  become_user: "{{ homebrew_user }}"
  when:
    - "'mas' in homebrew_outdated_packages or 'mas' not in homebrew_installed_packages"
  notify:
    - Get installed packages
    - Get outdated packages

- name: "Mac App Store CLI (mas) | Check installed apps"
  command: "mas list"
  register: installed_result
  changed_when: false
  check_mode: false

- name: Mac App Store CLI (mas) | Determine installed apps
  set_fact:
    mas_installed_apps: "{{ installed_result.stdout }}"