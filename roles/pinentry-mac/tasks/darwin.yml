---
- name: "pinentry-mac | Install pinentry-mac"
  homebrew:
    name: pinentry-mac
    state: latest
    sudo_password: "{{ ansible_become_password | default(omit) }}"
  become: "{{ (homebrew_user != ansible_user_id) | bool }}"
  become_user: "{{ homebrew_user }}"
  register: homebrew_install_result
  when:
    - "'pinentry-mac' in homebrew_outdated_packages or 'pinentry-mac' not in homebrew_installed_packages"

- name: Update installed packages
  include_tasks: roles/homebrew/tasks/installed-packages.yml
  when:
    - homebrew_install_result.changed

- name: Update outdated packages
  include_tasks: roles/homebrew/tasks/outdated-packages.yml
  when:
    - homebrew_install_result.changed
