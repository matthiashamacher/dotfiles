---
- name: "Bartender | Install Bartender"
  homebrew:
    name: bartender
    state: latest
    sudo_password: "{{ ansible_become_password | default(omit) }}"
  become: "{{ (homebrew_user != ansible_user_id) | bool }}"
  become_user: "{{ homebrew_user }}"
  when:
    - "'bartender' in homebrew_outdated_packages or 'bartender' not in homebrew_installed_packages"
  notify:
    - Get installed packages
    - Get outdated packages