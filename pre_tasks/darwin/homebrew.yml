---
- name: Determine Homebrew ownership variables
  set_fact:
    homebrew_user: '{{ homebrew_user | default(ansible_user_id) }}'
    homebrew_group: '{{ homebrew_group | default(ansible_user_gid) }}'

- name: "Update homebrew"
  command: "brew update --force"
  register: result
  changed_when:
    - '"You can upgrade them with brew upgrade" in result.stdout'

- name: "Initialise cache"
  command: "brew --cache"
  changed_when: false
  check_mode: false

- name: "Check installed packages"
  command: "brew list"
  register: installed_result
  changed_when: false
  check_mode: false

- name: Determine installed packages
  set_fact:
    homebrew_installed_packages: "{{ installed_result.stdout }}"

- name: "Check for taps"
  command: "brew tap"
  register: tap_result
  changed_when: false
  check_mode: false

- name: Determine taps
  set_fact:
    homebrew_taps: "{{ tap_result.stdout }}"

- name: "Check for outdated packages"
  command: "brew outdated"
  register: outdated_result
  changed_when: false
  check_mode: false

- name: Determine outdated packages
  set_fact:
    homebrew_outdated_packages: "{{ outdated_result.stdout }}"