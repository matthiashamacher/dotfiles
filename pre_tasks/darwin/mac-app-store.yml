---
- name: Install mas (Mac App Store CLI)
  homebrew:
    name: mas
    state: latest
    sudo_password: "{{ ansible_become_password | default(omit) }}"
  become: "{{ (homebrew_user != ansible_user_id) | bool }}"
  become_user: "{{ homebrew_user }}"
  when:
    - "'mas' in homebrew_outdated_packages or 'mas' not in homebrew_installed_packages"

- name: "Check installed apps"
  command: "mas list"
  register: installed_result
  changed_when: false
  check_mode: false

- name: Determine installed apps
  set_fact:
    mas_installed_apps: installed_result.stdout
